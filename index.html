<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>The Hammer of Aulë</title>

  <style>
    /* --- Dwarven Gate Overlay --- */
    #gate-overlay {
      position: fixed;
      inset: 0;
      background: #050607;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease;
    }

    .gate-slab {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: #2b2b2b;
      background-image: linear-gradient(145deg, #3a3a3a, #1e1e1e);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
      transition: transform 2s cubic-bezier(.65,0,.35,1);
    }

    #gate-left { left: 0; transform: translateX(0); }
    #gate-right { right: 0; transform: translateX(0); }

    #gate-seam {
      position: absolute;
      width: 6px;
      height: 100%;
      background: linear-gradient(to bottom, #ffb45e, #ff6a00, #ffb45e);
      box-shadow: 0 0 20px #ff6a00;
      opacity: 0.7;
      transition: opacity 1s ease;
    }
